<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      .intro {
        position: fixed;
        inset: 0;
        background: #fff;
        cursor: pointer;
      }

      .poster,
      .video,
      .fade,
      .start {
        position: fixed;
        inset: 0;
      }

      .poster,
      .video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 80ms ease-out;
      }

      .video {
        opacity: 0;
      }

      .video.visible {
        opacity: 1;
      }

      .poster.hidden {
        opacity: 0;
      }

      .start {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: #3d2715;
        cursor: pointer;
        font: 500 14px Georgia, "Times New Roman", serif;
        letter-spacing: 0;
        opacity: 1;
        padding: 0 24px 8vh;
        transition: opacity 300ms ease;
      }

      .start-label {
        position: absolute;
        bottom: 8vh;
        left: 50%;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: calc(100vw - 32px);
        padding: 9px 14px;
        border: 1px solid rgba(61, 39, 21, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 8px 24px rgba(61, 39, 21, 0.12);
        color: #3d2715;
        line-height: 1;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .start-icon {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }

      .start.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .fade {
        background: #fff;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1200ms ease;
      }

      .fade.active {
        opacity: 1;
      }

      @media (max-width: 600px) {
        .start {
          font-size: 13px;
          padding-bottom: 7vh;
        }

        .start-label {
          bottom: 7vh;
          padding: 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="intro" aria-label="Introducao em video">
      <img
        class="poster"
        id="poster"
        src="assets/intro-poster.jpg"
        alt=""
        draggable="false"
      >
      <video
        class="video"
        id="introVideo"
        src="assets/intro-video.mp4"
        poster="assets/intro-poster.jpg"
        playsinline
        webkit-playsinline
        muted
        preload="auto"
      ></video>
      <button class="start" id="startButton" type="button" aria-label="Clique para abrir">
        <span class="start-label" aria-hidden="true">
          <svg class="start-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12.503 4.142l-.707-.707L13.3 1.932l.707.707zM10 1.134H9v2.833h1zm-2.86 2.3L5.637 1.933l-.707.707 1.503 1.503zm11.835 10.788a1.418 1.418 0 0 0-1.466-1.489 4.475 4.475 0 0 0-.693.064l-.042-.016A1.388 1.388 0 0 0 15.478 12a1.788 1.788 0 0 0-.587.064A1.84 1.84 0 0 0 13 11.06a2.768 2.768 0 0 0-1 .167V6.9a1.905 1.905 0 0 0-2-1.846A1.905 1.905 0 0 0 8 6.9v6.954L6.979 12.64a1.624 1.624 0 0 0-1.066-.733 1.775 1.775 0 0 0-1.264.161 1.478 1.478 0 0 0-.71.968 1.588 1.588 0 0 0 .167 1.137l2.154 4.38 3.32 4.064.773-.635-3.221-3.921-2.144-4.359a.619.619 0 0 1-.074-.446.485.485 0 0 1 .235-.322.796.796 0 0 1 .543-.051.708.708 0 0 1 .47.328L9 16.6V6.9a.908.908 0 0 1 1-.846.908.908 0 0 1 1 .846V14h1v-1.379c0-.373.336-.562 1-.562.374 0 1 .073 1 .562V14h1v-.563c0-.36.111-.47.478-.47.507 0 .522.684.522.762v1.063h1V13.76l-.005.002.005-.008v.006c.011-.005.362-.027.508-.027.129 0 .492.156.492.761.022.245 0 2.992 0 4.093a7.863 7.863 0 0 1-.463 2.657c-.16.421-.56 1.221-.56 1.221l.918.43s.272-.606.398-.925a7.32 7.32 0 0 0 .471-1.57A26.038 26.038 0 0 0 19 17.07z"
              fill="currentColor"
            />
          </svg>
          Clique para abrir
        </span>
      </button>
      <div class="fade" id="fadeLayer" aria-hidden="true"></div>
    </main>

    <script>
      const video = document.getElementById("introVideo");
      const poster = document.getElementById("poster");
      const startButton = document.getElementById("startButton");
      const fadeLayer = document.getElementById("fadeLayer");
      let fadeStarted = false;

      video.load();

      startButton.addEventListener("click", function () {
        video.muted = true;
        video.currentTime = 0;

        const playPromise = video.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(function (error) {
            console.error("Nao foi possivel iniciar o video.", error);
          });
        }
      });

      video.addEventListener("timeupdate", function () {
        if (video.currentTime > 0.05) {
          video.classList.add("visible");
          poster.classList.add("hidden");
          startButton.classList.add("hidden");
        }

        if (!fadeStarted && video.duration && video.duration - video.currentTime <= 1.2) {
          startFadeAndRedirect();
        }
      });

      video.addEventListener("ended", startFadeAndRedirect);

      video.addEventListener("error", function () {
        console.error("Nao foi possivel carregar o video.");
      });

      function startFadeAndRedirect() {
        if (fadeStarted) {
          return;
        }

        fadeStarted = true;
        fadeLayer.classList.add("active");

        window.setTimeout(function () {
          window.location.href = "http://noivos.casar.com/marcela-vinicius";
        }, 1200);
      }
    </script>
  </body>
</html>
