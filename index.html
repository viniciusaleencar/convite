<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marcela &amp; Vin&iacute;cius &mdash; 08/08/2026</title>
    <meta name="description" content="Acesse aqui seu convite oficial">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Marcela &amp; Vin&iacute;cius &mdash; 08/08/2026">
    <meta property="og:description" content="Acesse aqui seu convite oficial">
    <meta property="og:image" content="assets/mini-poster.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Marcela &amp; Vin&iacute;cius &mdash; 08/08/2026">
    <meta name="twitter:description" content="Acesse aqui seu convite oficial">
    <meta name="twitter:image" content="assets/mini-poster.jpg">
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      .intro {
        position: fixed;
        inset: 0;
        background: #fff;
        cursor: pointer;
      }

      .poster,
      .video,
      .fade,
      .start {
        position: fixed;
        inset: 0;
      }

      .poster,
      .video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 80ms ease-out;
      }

      .video {
        opacity: 0;
      }

      .video.visible {
        opacity: 1;
      }

      .poster.hidden {
        opacity: 0;
      }

      .start {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: #3d2715;
        cursor: pointer;
        font: 500 14px Georgia, "Times New Roman", serif;
        letter-spacing: 0;
        opacity: 1;
        padding: 0 24px 8vh;
        transition: opacity 300ms ease;
      }

      .start-label {
        position: absolute;
        bottom: 8vh;
        left: 50%;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: calc(100vw - 32px);
        padding: 9px 14px;
        border: 1px solid rgba(61, 39, 21, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 8px 24px rgba(61, 39, 21, 0.12);
        color: #3d2715;
        line-height: 1;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      .start-icon {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }

      .start.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .fade {
        background: #fff;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1200ms ease;
      }

      .fade.active {
        opacity: 1;
      }

      @media (max-width: 600px) {
        .start {
          font-size: 13px;
          padding-bottom: 7vh;
        }

        .start-label {
          bottom: 7vh;
          padding: 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="intro" aria-label="Introducao em video">
      <img
        class="poster"
        id="poster"
        src="assets/intro-poster.jpg"
        alt=""
        draggable="false"
      >
      <video
        class="video"
        id="introVideo"
        src="assets/intro-video.mp4"
        poster="assets/intro-poster.jpg"
        playsinline
        webkit-playsinline
        muted
        preload="auto"
      ></video>
      <button class="start" id="startButton" type="button" aria-label="Clique para abrir">
        <span class="start-label" aria-hidden="true">
          <svg class="start-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M9 11V5.5a1.5 1.5 0 0 1 3 0V11m0-2.5V4.5a1.5 1.5 0 0 1 3 0V11m0-1.5V6.5a1.5 1.5 0 0 1 3 0V13m-9-2 1.7 6.1a4 4 0 0 0 3.8 2.9H15a5 5 0 0 0 5-5v-2.5m-11-1L7.4 9.4a1.7 1.7 0 0 0-2.4 2.4l3.7 3.7"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Clique para abrir
        </span>
      </button>
      <div class="fade" id="fadeLayer" aria-hidden="true"></div>
    </main>

    <script>
      const video = document.getElementById("introVideo");
      const poster = document.getElementById("poster");
      const startButton = document.getElementById("startButton");
      const fadeLayer = document.getElementById("fadeLayer");
      let fadeStarted = false;

      video.load();

      startButton.addEventListener("click", function () {
        video.muted = true;
        video.currentTime = 0;

        const playPromise = video.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(function (error) {
            console.error("Nao foi possivel iniciar o video.", error);
          });
        }
      });

      video.addEventListener("timeupdate", function () {
        if (video.currentTime > 0.05) {
          video.classList.add("visible");
          poster.classList.add("hidden");
          startButton.classList.add("hidden");
        }

        if (!fadeStarted && video.duration && video.duration - video.currentTime <= 1.2) {
          startFadeAndRedirect();
        }
      });

      video.addEventListener("ended", startFadeAndRedirect);

      video.addEventListener("error", function () {
        console.error("Nao foi possivel carregar o video.");
      });

      function startFadeAndRedirect() {
        if (fadeStarted) {
          return;
        }

        fadeStarted = true;
        fadeLayer.classList.add("active");

        window.setTimeout(function () {
          window.location.href = "http://noivos.casar.com/marcela-vinicius";
        }, 1200);
      }
    </script>
  </body>
</html>
